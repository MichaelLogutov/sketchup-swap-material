<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!-- Concept C: Two overlapping material chips, large circular swap arrow -->

  <!-- Shadow -->
  <rect x="36" y="40" width="42" height="42" rx="7" fill="#0002"/>

  <!-- Back chip (blue) — offset bottom-right -->
  <rect x="34" y="38" width="42" height="42" rx="7" fill="#3A7EBF"/>
  <line x1="34" y1="50" x2="76" y2="50" stroke="white" stroke-width="1.2" opacity="0.3"/>
  <line x1="34" y1="62" x2="76" y2="62" stroke="white" stroke-width="1.2" opacity="0.3"/>
  <line x1="34" y1="74" x2="76" y2="74" stroke="white" stroke-width="1.2" opacity="0.3"/>
  <line x1="46" y1="38" x2="46" y2="80" stroke="white" stroke-width="1.2" opacity="0.3"/>
  <line x1="58" y1="38" x2="58" y2="80" stroke="white" stroke-width="1.2" opacity="0.3"/>

  <!-- Shadow -->
  <rect x="18" y="16" width="42" height="42" rx="7" fill="#0002"/>

  <!-- Front chip (terracotta) -->
  <rect x="16" y="14" width="42" height="42" rx="7" fill="#C0622F"/>
  <line x1="16" y1="26" x2="58" y2="26" stroke="white" stroke-width="1.2" opacity="0.3"/>
  <line x1="16" y1="38" x2="58" y2="38" stroke="white" stroke-width="1.2" opacity="0.3"/>
  <line x1="16" y1="50" x2="58" y2="50" stroke="white" stroke-width="1.2" opacity="0.3"/>
  <line x1="28" y1="14" x2="28" y2="56" stroke="white" stroke-width="1.2" opacity="0.3"/>
  <line x1="40" y1="14" x2="40" y2="56" stroke="white" stroke-width="1.2" opacity="0.3"/>

  <!-- Swap arrow badge -->
  <circle cx="70" cy="26" r="16" fill="white" stroke="#ddd" stroke-width="1"/>
  <!-- Top arrow: → -->
  <line x1="59" y1="22" x2="73" y2="22" stroke="#444" stroke-width="2.8" stroke-linecap="round"/>
  <polygon points="80,22 72,18 72,26" fill="#444"/>
  <!-- Bottom arrow: ← -->
  <line x1="81" y1="30" x2="67" y2="30" stroke="#444" stroke-width="2.8" stroke-linecap="round"/>
  <polygon points="60,30 68,26 68,34" fill="#444"/>
</svg>
